version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      time: '09:00'
      day: wednesday
      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
    assignees:
      - shgysk8zer0
    labels:
      - dependencies
      - javascript
    groups:
      all-dependencies:
        patterns:
          - '*'
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      time: '09:00'
