      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
    assignees:
      - shgysk8zer0
    groups:
      all-dependencies:
        patterns:
          - '*'
  - package-ecosystem: gitsubmodule
    directory: /
    schedule:
